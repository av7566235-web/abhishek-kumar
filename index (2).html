<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abhishek — Search</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #202124;
            --surface: #303134;
            --text: #e8eaed;
            --text-secondary: #9aa0a6;
            --accent: #c9a96e;
            --border: #5f6368;
            --hover: rgba(255,255,255,0.1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 1rem 1.5rem;
            gap: 1.2rem;
        }

        .top-bar a {
            color: var(--text);
            text-decoration: none;
            font-size: 0.85rem;
            transition: opacity 0.2s;
        }

        .top-bar a:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #8b7355);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.9rem;
            color: #fff;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color 0.2s;
        }

        .avatar:hover {
            border-color: var(--text-secondary);
        }

        /* Main Content */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            margin-top: -10vh;
        }

        /* Animated Logo */
        .logo-container {
            margin-bottom: 2.5rem;
            position: relative;
        }

        .logo {
            font-size: clamp(3.5rem, 10vw, 5.5rem);
            font-weight: 700;
            letter-spacing: -0.05em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.05em;
        }

        .logo span {
            display: inline-block;
            animation: bounceIn 0.6s ease backwards;
        }

        .logo .a1 { color: #c9a96e; animation-delay: 0.0s; }
        .logo .b { color: #e8d5a3; animation-delay: 0.05s; }
        .logo .h { color: #c9a96e; animation-delay: 0.1s; }
        .logo .i { color: #e8d5a3; animation-delay: 0.15s; }
        .logo .s { color: #c9a96e; animation-delay: 0.2s; }
        .logo .h2 { color: #e8d5a3; animation-delay: 0.25s; }
        .logo .e { color: #c9a96e; animation-delay: 0.3s; }
        .logo .k { color: #e8d5a3; animation-delay: 0.35s; }

        @keyframes bounceIn {
            0% { opacity: 0; transform: translateY(30px) scale(0.8); }
            60% { transform: translateY(-10px) scale(1.05); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo-sub {
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        /* Search Box */
        .search-wrapper {
            width: 100%;
            max-width: 580px;
            position: relative;
        }

        .search-box {
            width: 100%;
            display: flex;
            align-items: center;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 0.8rem 1rem;
            transition: all 0.2s;
            box-shadow: none;
        }

        .search-box:focus-within {
            background: var(--surface);
            border-color: rgba(201, 169, 110, 0.4);
            box-shadow: 0 1px 6px rgba(0,0,0,0.3);
        }

        .search-icon {
            color: var(--text-secondary);
            margin-right: 0.8rem;
            flex-shrink: 0;
        }

        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-size: 1rem;
            font-family: inherit;
        }

        .search-input::placeholder {
            color: var(--text-secondary);
        }

        .mic-icon {
            color: var(--accent);
            margin-left: 0.8rem;
            cursor: pointer;
            flex-shrink: 0;
            transition: transform 0.2s;
        }

        .mic-icon:hover {
            transform: scale(1.1);
        }

        /* Search Buttons */
        .search-buttons {
            display: flex;
            gap: 0.8rem;
            justify-content: center;
            margin-top: 1.8rem;
        }

        .btn {
            background: var(--surface);
            border: 1px solid transparent;
            color: var(--text);
            padding: 0.6rem 1.2rem;
            border-radius: 4px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn:hover {
            border-color: var(--border);
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        .btn-primary {
            background: var(--accent);
            color: #1a1a1a;
            font-weight: 600;
        }

        .btn-primary:hover {
            background: #e8d5a3;
            border-color: transparent;
        }

        /* Shortcuts Grid */
        .shortcuts {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 1rem;
            max-width: 600px;
            width: 100%;
            margin-top: 3rem;
            padding: 0 1rem;
        }

        .shortcut {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.6rem;
            padding: 1rem 0.5rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            position: relative;
        }

        .shortcut:hover {
            background: var(--hover);
        }

        .shortcut-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--surface);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            transition: transform 0.2s;
        }

        .shortcut:hover .shortcut-icon {
            transform: scale(1.1);
        }

        .shortcut-name {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-align: center;
        }

        .shortcut-dots {
            position: absolute;
            top: 4px;
            right: 4px;
            opacity: 0;
            transition: opacity 0.2s;
            color: var(--text-secondary);
            font-size: 1rem;
            line-height: 1;
        }

        .shortcut:hover .shortcut-dots {
            opacity: 1;
        }

        /* Footer */
        .footer {
            background: #171717;
            padding: 1rem 2rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .footer-top {
            padding-bottom: 0.8rem;
            border-bottom: 1px solid #3c4043;
            margin-bottom: 0.8rem;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .footer-links a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: var(--text);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .shortcuts {
                grid-template-columns: repeat(4, 1fr);
                gap: 0.5rem;
            }
            .main {
                margin-top: -5vh;
            }
        }

        /* Selection */
        ::selection {
            background: rgba(201, 169, 110, 0.3);
        }
    </style>
</head>
<body>
    <!-- Top Bar -->
    <div class="top-bar">
        <a href="#">Gmail</a>
        <a href="#">Images</a>
        <div class="avatar" title="Abhishek Kumar">AK</div>
    </div>

    <!-- Main -->
    <div class="main">
        <!-- Logo -->
        <div class="logo-container">
            <div class="logo">
                <span class="a1">A</span>
                <span class="b">b</span>
                <span class="h">h</span>
                <span class="i">i</span>
                <span class="s">s</span>
                <span class="h2">h</span>
                <span class="e">e</span>
                <span class="k">k</span>
            </div>
            <div class="logo-sub">Search</div>
        </div>

        <!-- Search -->
        <div class="search-wrapper">
            <form action="https://www.google.com/search" method="GET" target="_blank">
                <div class="search-box">
                    <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="m21 21-4.35-4.35"/>
                    </svg>
                    <input type="text" name="q" class="search-input" placeholder="Search Google or type a URL" autocomplete="off" autofocus>
                    <svg class="mic-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                        <line x1="12" y1="19" x2="12" y2="23"/>
                        <line x1="8" y1="23" x2="16" y2="23"/>
                    </svg>
                </div>
                <div class="search-buttons">
                    <button type="submit" class="btn btn-primary">Google Search</button>
                    <button type="button" class="btn" onclick="lucky()">I'm Feeling Lucky</button>
                </div>
            </form>
        </div>

        <!-- Shortcuts -->
        <div class="shortcuts">
            <a href="https://github.com" target="_blank" class="shortcut">
                <span class="shortcut-dots">⋮</span>
                <div class="shortcut-icon">💻</div>
                <span class="shortcut-name">GitHub</span>
            </a>
            <a href="https://linkedin.com" target="_blank" class="shortcut">
                <span class="shortcut-dots">⋮</span>
                <div class="shortcut-icon">💼</div>
                <span class="shortcut-name">LinkedIn</span>
            </a>
            <a href="https://instagram.com" target="_blank" class="shortcut">
                <span class="shortcut-dots">⋮</span>
                <div class="shortcut-icon">📸</div>
                <span class="shortcut-name">Instagram</span>
            </a>
            <a href="https://youtube.com" target="_blank" class="shortcut">
                <span class="shortcut-dots">⋮</span>
                <div class="shortcut-icon">▶️</div>
                <span class="shortcut-name">YouTube</span>
            </a>
            <a href="https://dribbble.com" target="_blank" class="shortcut">
                <span class="shortcut-dots">⋮</span>
                <div class="shortcut-icon">🎨</div>
                <span class="shortcut-name">Dribbble</span>
            </a>
            <a href="https://figma.com" target="_blank" class="shortcut">
                <span class="shortcut-dots">⋮</span>
                <div class="shortcut-icon">🎯</div>
                <span class="shortcut-name">Figma</span>
            </a>
            <a href="https://chat.openai.com" target="_blank" class="shortcut">
                <span class="shortcut-dots">⋮</span>
                <div class="shortcut-icon">🤖</div>
                <span class="shortcut-name">ChatGPT</span>
            </a>
            <a href="https://vercel.com" target="_blank" class="shortcut">
                <span class="shortcut-dots">⋮</span>
                <div class="shortcut-icon">▲</div>
                <span class="shortcut-name">Vercel</span>
            </a>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <div class="footer-top">India</div>
        <div class="footer-links">
            <a href="#">About</a>
            <a href="#">Advertising</a>
            <a href="#">Business</a>
            <a href="#">How Search works</a>
            <a href="#">Privacy</a>
            <a href="#">Terms</a>
            <a href="#">Settings</a>
        </div>
    </div>

    <script>
        function lucky() {
            const sites = [
                'https://github.com/trending',
                'https://www.producthunt.com',
                'https://dribbble.com/shots/popular',
                'https://www.awwwards.com/websites/',
                'https://www.behance.net/galleries/graphic-design'
            ];
            window.open(sites[Math.floor(Math.random() * sites.length)], '_blank');
        }

        document.querySelector('.search-input').focus();

        const luckyBtn = document.querySelectorAll('.btn')[1];
        const feelings = ['I'm Feeling Lucky', 'I'm Feeling Curious', 'I'm Feeling Artistic', 'I'm Feeling Inspired'];
        let feelingIndex = 0;

        setInterval(() => {
            feelingIndex = (feelingIndex + 1) % feelings.length;
            luckyBtn.textContent = feelings[feelingIndex];
        }, 3000);
    </script>
</body>
</html>
